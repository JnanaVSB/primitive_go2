env:
  xml_path: go2/scene.xml
  control_substeps: 4
  initial_base_height: 0.27
  initial_angles: [0.0, 0.9, -1.8, 0.0, 0.9, -1.8, 0.0, 0.9, -1.8, 0.0, 0.9, -1.8]
  settle_steps: 500

primitive:
  settle_steps_after: 500

stiffness_modes:
  soft:   {kp: 40.0,  kd: 3.0}
  normal: {kp: 80.0,  kd: 4.0}
  stiff:  {kp: 150.0, kd: 8.0}

llm:
  provider: anthropic
  model: claude-sonnet-4-5-20250929
  temperature: 0.7
  max_tokens: 2000

runner:
  max_iterations: 5
  success_threshold: -0.05
  max_parse_retries: 3
  templates_dir: templates
  log_dir: logs

task:
  name: sit
  description: "Make the robot sit down. A good sit has the rear legs tucked under the body and front legs extended."
  target:
    h: 0.17
    roll: 0.0
    pitch: -0.3