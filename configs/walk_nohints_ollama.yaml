env:
  xml_path: go2/scene.xml
  control_substeps: 4
  initial_base_height: 0.27
  initial_angles: [0.0, 0.9, -1.8, 0.0, 0.9, -1.8, 0.0, 0.9, -1.8, 0.0, 0.9, -1.8]
  settle_steps: 500

primitive:
  settle_steps_after: 500

stiffness_modes:
  soft:   {kp: 40.0,  kd: 3.0}
  normal: {kp: 80.0,  kd: 4.0}
  stiff:  {kp: 150.0, kd: 8.0}

llm:
  provider: ollama
  model: gpt-oss:120b
  temperature: 0.7
  max_tokens: 6000
  base_url: http://sg014:11434
  max_retries: 5
  retry_delay: 120.0

runner:
  max_iterations: 30
  success_threshold: 3
  max_parse_retries: 3
  templates_dir: templates
  log_dir: logs

task:
  name: walk_nohints
  sequence:
    - name: walk
      target:
        h: 0.27
        roll: 0.0
        pitch: 0.0
      distance_weight: 0.05
      success_threshold: 3
      policy_count: 4
      loop_duration: 10.0
      phase_duration: 0.5